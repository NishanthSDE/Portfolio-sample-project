    <div class="section-container" style="width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 0;">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h1 class="font-theater transmission-reveal project-heading-match" style="font-size: clamp(32px, 4.8vw, 64px); letter-spacing: 1px; line-height: 1; margin-bottom: 14px;">
                    CONTACT
                </h1>
                <p class="contact-title transmission-reveal">
                    Let's Secure The Future Together
                </p>
                <p class="contact-desc transmission-reveal">
                    Open to opportunities and collaborations in cybersecurity, network security, and SEO-driven digital growth. Reach out to discuss projects, roles, or partnerships.
                </p>
                <div class="transmission-reveal">
                    <ul class="contact-details-list">
                        <li class="contact-details-item">
                            <div class="contact-icon-box">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                                </svg>
                            </div>
                            <p>jeeva1234ananthan@gmail.com</p>
                        </li>
                        <li class="contact-details-item">
                            <div class="contact-icon-box">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
                                </svg>
                            </div>
                            <p>+91 9080870042</p>
                        </li>
                        <li class="contact-details-item">
                            <div class="contact-icon-box">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                                </svg>
                            </div>
                            <p>Bangalore, India - 560100</p>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="contact-form-wrapper transmission-reveal">
                <form id="contact-form" action="https://formspree.io/f/xojbjrpk" method="POST" class="contact-form-styled">
                    <div class="form-field">
                        <label class="form-field-label">
                            Full name
                        </label>
                        <input type="text" id="contact-name" name="name" class="form-input-styled" required />
                    </div>
                    <div class="form-field">
                        <label class="form-field-label">
                            Email
                        </label>
                        <input type="email" id="contact-email" name="email" class="form-input-styled" required />
                    </div>
                    <div class="form-field">
                        <label class="form-field-label">
                            Company
                        </label>
                        <input type="text" id="contact-company" name="company" class="form-input-styled" required />
                    </div>
                    <div class="form-field">
                        <label class="form-field-label">
                            Message
                        </label>
                        <textarea id="contact-message" name="message" class="form-input-styled form-textarea-styled" required></textarea>
                    </div>
                    <button type="submit" class="form-submit-btn">
                        Send
                    </button>
                </form>

                <script>
                    (function() {
                        const form = document.getElementById('contact-form');
                        if (!form) return;

                        form.addEventListener('submit', function(e) {
                            const name = document.getElementById('contact-name');
                            const email = document.getElementById('contact-email');
                            const company = document.getElementById('contact-company');
                            const message = document.getElementById('contact-message');

                            if (!name.value.trim()) {
                                e.preventDefault();
                                alert('Please enter your Full Name before submitting.');
                                name.focus();
                                return;
                            }

                            if (!email.value.trim()) {
                                e.preventDefault();
                                alert('Please provide your Email Address so I can get back to you.');
                                email.focus();
                                return;
                            }

                            if (!company.value.trim()) {
                                e.preventDefault();
                                alert('Please enter your Company name.');
                                company.focus();
                                return;
                            }

                            if (!message.value.trim()) {
                                e.preventDefault();
                                alert('Please write a Message describing what you would like to discuss.');
                                message.focus();
                                return;
                            }
                        });
                    })();
                </script>
            </div>
        </div>
    </div>
</div>
