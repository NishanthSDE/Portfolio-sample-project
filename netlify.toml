[build]
  publish = "."

# Enable Brotli/Gzip compression
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = true

# Security + performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Aggressively cache images for 1 year (they never change)
[[headers]]
  for = "/CYBERFICTION-IMAGES/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS: always revalidate (prevent stale code after deployments)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# JS: always revalidate (prevent stale code after deployments)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# Never cache HTML (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Allow sections to be fetched (CORS for fetch() calls)
[[headers]]
  for = "/sections/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=0, must-revalidate"
